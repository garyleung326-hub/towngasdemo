<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCS1 Styled Job Order Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.6875rem, 0.66rem + 0.18vw, 0.8125rem);
      --text-sm: clamp(0.75rem, 0.73rem + 0.16vw, 0.875rem);
      --text-base: clamp(0.875rem, 0.85rem + 0.16vw, 0.9375rem);
      --text-lg: clamp(0.9375rem, 0.9rem + 0.22vw, 1.0625rem);
      --text-xl: clamp(1.125rem, 1rem + 0.4vw, 1.35rem);

      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
      --space-12: 3rem; --space-16: 4rem;

      --color-bg: #f6f8fb;
      --color-surface: #ffffff;
      --color-surface-2: #fbfcfe;
      --color-surface-offset: #f0f4f8;
      --color-surface-dynamic: #e7edf4;
      --color-border: #d9e2ec;
      --color-divider: #e6edf4;
      --color-text: #0f1728;
      --color-text-muted: #5b6980;
      --color-text-faint: #90a0b5;
      --color-text-inverse: #ffffff;
      --color-primary: #0c5d78;
      --color-primary-hover: #09485e;
      --color-primary-active: #063544;
      --color-primary-highlight: #d9ebf0;
      --color-success: #247456;
      --color-warning: #b56f1f;
      --color-error: #b84343;
      --radius-sm: 0.45rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(15, 23, 40, 0.04);
      --shadow-md: 0 16px 40px rgba(15, 23, 40, 0.08);
      --transition: 180ms cubic-bezier(.16,1,.3,1);
      --font-body: 'Inter', sans-serif;
      --font-display: 'Inter', sans-serif;
      --content: 980px;
    }

    [data-theme="dark"] {
      --color-bg: #08131a;
      --color-surface: #0f1d27;
      --color-surface-2: #122230;
      --color-surface-offset: #0d1822;
      --color-surface-dynamic: #173042;
      --color-border: #1f3343;
      --color-divider: #1a2b39;
      --color-text: #e7f0f6;
      --color-text-muted: #9fb1c1;
      --color-text-faint: #6e8396;
      --color-text-inverse: #07131a;
      --color-primary: #39a9c5;
      --color-primary-hover: #62bad0;
      --color-primary-active: #8fd0df;
      --color-primary-highlight: #14303a;
      --color-success: #58b38f;
      --color-warning: #d8a259;
      --color-error: #e37d7d;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.28);
      --shadow-md: 0 18px 44px rgba(0,0,0,0.35);
    }

    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top right, rgba(57,169,197,.08), transparent 28%),
        linear-gradient(180deg, #f8fbfd 0%, var(--color-bg) 100%);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(circle at top right, rgba(57,169,197,.12), transparent 28%),
        linear-gradient(180deg, #071118 0%, var(--color-bg) 100%);
    }
    img, svg { display: block; max-width: 100%; }
    input, select, textarea, button { font: inherit; color: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; }

    .app-shell {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
    }





    .logo h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; }
    .logo p { font-size: var(--text-xs); color: rgba(255,255,255,.6); }






    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .masthead {
      padding: var(--space-6) var(--space-8) var(--space-5);
      border-bottom: 1px solid var(--color-divider);
      background: color-mix(in srgb, var(--color-surface) 92%, transparent);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .masthead-inner {
      max-width: var(--content);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-5);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .38rem .7rem;
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }
    .hero h2 {
      font-size: var(--text-xl);
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .hero p {
      margin-top: .35rem;
      color: var(--color-text-muted);
      max-width: 72ch;
      font-size: var(--text-sm);
    }

    .actions { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
    .btn {
      min-height: 44px;
      padding: .78rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: var(--text-sm);
      font-weight: 700;
      transition: all var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-color: transparent;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-quiet {
      background: color-mix(in srgb, var(--color-surface) 50%, transparent);
    }
    .theme-toggle {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
    }







    .content {
      padding: 0 var(--space-8) var(--space-8);
    }
    .content-inner {
      max-width: var(--content);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: var(--space-6);
      align-items: start;
    }

    .panel {
      background: color-mix(in srgb, var(--color-surface) 90%, transparent);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .panel-head {
      padding: var(--space-6);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      background: linear-gradient(180deg, color-mix(in srgb, var(--color-surface) 96%, transparent), color-mix(in srgb, var(--color-surface-offset) 80%, transparent));
    }
    .panel-head h3 { font-size: var(--text-lg); font-weight: 800; letter-spacing: -.02em; }
    .panel-head p { margin-top: .35rem; color: var(--color-text-muted); font-size: var(--text-sm); }

    .panel-body {
      padding: var(--space-6);
      display: grid;
      gap: var(--space-6);
    }

    .section {
      display: grid;
      gap: var(--space-4);
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--color-divider);
    }
    .section:last-child { border-bottom: none; padding-bottom: 0; }
    .section-title {
      display: flex;
      align-items: center;
      gap: .65rem;
      font-size: var(--text-sm);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }
    .section-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: 12px;
      font-weight: 800;
    }

    .grid-2, .grid-3, .grid-4 { display: grid; gap: var(--space-4); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .field { display: grid; gap: .55rem; min-width: 0; }
    .field label {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
    }
    .required::after { content: ' *'; color: var(--color-error); }
    .input, .select, .textarea {
      width: 100%;
      min-height: 46px;
      padding: .85rem .95rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      color: var(--color-text);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .textarea { min-height: 120px; resize: vertical; }
    .input::placeholder, .textarea::placeholder { color: var(--color-text-faint); }
    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 14%, transparent);
      outline: none;
      background: var(--color-surface);
    }
    .help { color: var(--color-text-muted); font-size: var(--text-xs); }

    .tag-row { display: flex; flex-wrap: wrap; gap: .75rem; }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: .55rem .85rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 700;
    }
    .tag.active {
      border-color: transparent;
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }
    .option {
      display: flex;
      gap: .8rem;
      padding: 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: linear-gradient(180deg, var(--color-surface-2), var(--color-surface));
    }
    .option input { margin-top: .2rem; }
    .option strong { display: block; font-size: var(--text-sm); }
    .option span { display: block; font-size: var(--text-xs); color: var(--color-text-muted); margin-top: .18rem; }

    .table-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-surface-2);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--color-surface-offset); }
    th, td {
      text-align: left;
      padding: .95rem;
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-sm);
      vertical-align: top;
    }
    th {
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    tbody tr:last-child td { border-bottom: none; }
    .line-input {
      width: 100%;
      min-height: 38px;
      padding: .55rem .65rem;
      border-radius: .6rem;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
    }










    @media (max-width: 920px) {
      .app-shell { grid-template-columns: 1fr; }
  
  </style>
</head>
<body>
  <div class="app-shell">
    

    <main class="main">
      <header class="masthead">
        <div class="masthead-inner">
          <div class="hero">
            <h2>Create Job Order</h2>
          </div>
          <div class="actions">
            <button class="btn btn-quiet">Cancel</button>
            <button class="btn">Save Draft</button>
            <button class="btn btn-primary">Create Job</button>
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme"></button>
          </div>
        </div>
      </header>

      

      

      <section class="content">
        <div class="content-inner">
          <section class="panel" aria-labelledby="job-form-title">
            <div class="panel-head">
              <div>
                <h3 id="job-form-title">Job Order Form</h3>
                
              </div>
              <div class="tag-row" aria-label="Status labels">
                <span class="tag active">High Priority</span>
                
              </div>
            </div>

            <form class="panel-body">
              <section class="section">
                <div class="section-title"><span class="section-icon">1</span> Requester & Property</div>
                <div class="grid-2">
                  <div class="field">
                    <label class="required" for="property">Property / Hotel</label>
                    <input class="input" id="property" value="Harbour View Hotel Kowloon" data-param="property" />
                  </div>
                  <div class="field">
                    <label class="required" for="department">Requesting Department</label>
                    <select class="select" id="department">
                      <option>Engineering</option>
                      <option>Housekeeping</option>
                      <option>Front Office</option>
                      <option selected>Guest Services</option>
                    </select>
                  </div>
                </div>
                <div class="grid-3">
                  <div class="field">
                    <label for="location">Location / Room</label>
                    <input class="input" id="location" value="Level 18 · AHU Service Corridor" data-param="location" />
                  </div>
                  <div class="field">
                    <label class="required" for="requester">Requester Name</label>
                    <input class="input" id="requester" value="Kelvin Wong" data-param="requester" />
                  </div>
                  <div class="field">
                    <label for="contact">Contact</label>
                    <input class="input" id="contact" value="+852 6123 4567" />
                  </div>
                </div>
              </section>

              <section class="section">
                <div class="section-title"><span class="section-icon">2</span> Job Profile</div>
                <div class="grid-3">
                  <div class="field">
                    <label class="required" for="job-type">Job Type</label>
                    <select class="select" id="job-type">
                      <option>Maintenance Job</option>
                      <option selected>Guest Request</option>
                      <option>Inspection Task</option>
                      <option>Incident Follow-up</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="source">Source</label>
                    <select class="select" id="source">
                      <option selected>Internal Team</option>
                      <option>Guest App</option>
                      <option>PMS Integration</option>
                      <option>Front Desk</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="service-level">Service Level</label>
                    <select class="select" id="service-level">
                      <option>Normal</option>
                      <option selected>Urgent</option>
                      <option>Critical</option>
                    </select>
                  </div>
                </div>
                <div class="field">
                  <label class="required" for="summary">Short Summary</label>
                  <input class="input" id="summary" value="Water ingress reported near rooftop mechanical zone" />
                </div>
                <div class="field">
                  <label class="required">Priority</label>
                  <div class="tag-row">
                    <span class="tag">Low</span>
                    <span class="tag">Medium</span>
                    <span class="tag active">High</span>
                    <span class="tag">Critical</span>
                  </div>
                </div>
              </section>

              <section class="section">
                <div class="section-title"><span class="section-icon">3</span> Scheduling & Assignment</div>
                <div class="grid-4">
                  <div class="field">
                    <label class="required" for="date">Requested Date</label>
                    <input class="input" id="date" type="date" value="2026-07-17" />
                  </div>
                  <div class="field">
                    <label for="window">Time Window</label>
                    <select class="select" id="window">
                      <option>08:00 - 10:00</option>
                      <option selected>10:00 - 12:00</option>
                      <option>12:00 - 14:00</option>
                      <option>14:00 - 18:00</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="assignee">Assigned Team</label>
                    <select class="select" id="assignee">
                      <option selected>Engineering Shift A</option>
                      <option>Engineering Shift B</option>
                      <option>Housekeeping Response</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="owner">Job Owner</label>
                    <select class="select" id="owner">
                      <option selected>Raymond Li</option>
                      <option>Daniel Chan</option>
                      <option>Unassigned</option>
                    </select>
                  </div>
                </div>
                <div class="option-grid">
                  <label class="option"><input type="checkbox" checked><span><strong>Mobile notification</strong><span>Send live task update to assigned staff devices.</span></span></label>
                  <label class="option"><input type="checkbox" checked><span><strong>Escalation enabled</strong><span>Raise alert if SLA threshold is exceeded.</span></span></label>
                  <label class="option"><input type="checkbox"><span><strong>Guest visible update</strong><span>Expose status note back to concierge or front office.</span></span></label>
                  <label class="option"><input type="checkbox" checked><span><strong>Photo proof required</strong><span>Require completion image before closeout.</span></span></label>
                </div>
              </section>

              <section class="section">
                <div class="section-title"><span class="section-icon">4</span> Work Details</div>
                <div class="field">
                  <label class="required" for="description">Detailed Description</label>
                  <textarea class="textarea" id="description">Guest-facing corridor ceiling shows signs of overnight water ingress. Inspect membrane seam, rooftop drainage path, and any mechanical plinth flashing above the reported location. Provide temporary mitigation if active leakage continues.</textarea>
                </div>
                <div class="grid-2">
                  <div class="field">
                    <label for="instructions">Internal Instructions</label>
                    <textarea class="textarea" id="instructions">Coordinate with duty manager before access. Carry moisture scanner, safety harness, and absorbent containment kit. Log findings in photo set for engineering review.</textarea>
                  </div>
                  <div class="field">
                    <label for="resolution">Resolution Notes Template</label>
                    <textarea class="textarea" id="resolution">Inspection completed. Root cause identified / not identified. Immediate action taken. Additional materials or follow-up visit required: yes / no.</textarea>
                  </div>
                </div>
              </section>

              <section class="section">
                <div class="section-title"><span class="section-icon">5</span> Parts & Time Plan</div>
                <div class="table-card">
                  <table>
                    <thead>
                      <tr>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Qty</th>
                        <th>Unit</th>
                        <th>Plan</th>
                        <th>Cost</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td><select class="line-input"><option selected>Labor</option><option>Material</option><option>Tool</option></select></td>
                        <td><input class="line-input" value="Engineering technician" /></td>
                        <td><input class="line-input" value="3" /></td>
                        <td><input class="line-input" value="Hours" /></td>
                        <td><input class="line-input" value="Standard response" /></td>
                        <td><input class="line-input" value="HKD 1,950" /></td>
                      </tr>
                      <tr>
                        <td><select class="line-input"><option>Labor</option><option selected>Tool</option><option>Material</option></select></td>
                        <td><input class="line-input" value="Moisture scanner" /></td>
                        <td><input class="line-input" value="1" /></td>
                        <td><input class="line-input" value="Unit" /></td>
                        <td><input class="line-input" value="Bring from workshop" /></td>
                        <td><input class="line-input" value="HKD 250" /></td>
                      </tr>
                      <tr>
                        <td><select class="line-input"><option>Labor</option><option>Tool</option><option selected>Material</option></select></td>
                        <td><input class="line-input" value="Temporary sealing compound" /></td>
                        <td><input class="line-input" value="2" /></td>
                        <td><input class="line-input" value="Tubes" /></td>
                        <td><input class="line-input" value="Emergency stock" /></td>
                        <td><input class="line-input" value="HKD 180" /></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="help">Illustrative planning table for UI simulation only.</div>
              </section>

              <div class="footer-actions">
                <div class="actions">
                  <button type="button" class="btn">Attach Media</button>
                  <button type="button" class="btn">Preview Ticket</button>
                </div>
                <div class="actions">
                  <button type="reset" class="btn btn-quiet">Reset</button>
                  <button type="button" class="btn">Save Draft</button>
                  <button type="submit" class="btn btn-primary">Submit Job Order</button>
                </div>
              </div>
            </form>
          </section>

          
        </div>
      </section>
    </main>
  </div>

  <script>
    (function(){
      const toggle=document.querySelector('[data-theme-toggle]');
      const root=document.documentElement;
      let theme=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      const paint=()=>{
        root.setAttribute('data-theme',theme);
        toggle.innerHTML=theme==='dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
      };
      const params = new URLSearchParams(window.location.search);
      document.querySelectorAll('[data-param]').forEach((el)=>{
        const key = el.getAttribute('data-param');
        const value = params.get(key);
        if (value) el.value = value;
      });
      paint();
      toggle.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';paint();});
    })();
  </script>
</body>
</html>
