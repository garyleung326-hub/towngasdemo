<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voicemail Transcript</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #d7dee8;
      --accent-dark: #0f3d7a;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.10);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { width: min(1080px, 100%); }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }
    .logo-block { display: flex; justify-content: center; margin-bottom: 18px; }
    .logo-block img { max-width: min(100%, 420px); height: auto; display: block; }
    .heading {
      text-align: center;
      font-size: clamp(2rem, 1.4rem + 2vw, 3rem);
      line-height: 1.15;
      margin: 0 0 24px;
      color: var(--accent-dark);
      letter-spacing: 0.02em;
    }
    .transcript {
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      background: #f9fafb;
      color: var(--muted);
      font-size: clamp(1.2rem, 1rem + 0.9vw, 1.8rem);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 220px;
    }
    .empty { color: #9ca3af; font-style: italic; }
    .note {
      margin-top: 18px;
      font-size: 1rem;
      color: #6b7280;
      text-align: center;
    }
    @media (max-width: 640px) {
      .panel { padding: 20px; }
      td { padding: 18px 14px; }
      td:first-child { width: 34%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel" aria-labelledby="page-title">
      <div class="logo-block" aria-label="Towngas logo">
        <img src="Towngas_2024_01.png" alt="Towngas logo" width="600" height="168" style="max-width:min(100%, 420px); height:auto;" />
      </div>
      <h1 id="page-title" class="heading">Voicemail Transcript</h1>
      <div aria-label="Voicemail transcript content" id="transcriptValue" class="transcript empty">Not provided</div>
      
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const transcript = params.get('transcript');
    const el = document.getElementById('transcriptValue');
    if (transcript && transcript.trim()) {
      el.textContent = transcript;
      el.classList.remove('empty');
    }
  </script>
</body>
</html>
